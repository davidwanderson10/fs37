<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="iphone.png" alt="iPhone 15 128GB">
            <h1>iPhone 15 128GB</h1>
            <p>R$ 3.999,00</p>
            <button>Comprar</button>
        </div>
        <div class="card">
            <img src="tv.png" alt="TV 55 4K">
            <h1>TV 55 4K</h1>
            <p>R$ 2.999,00</p>
            <button>Comprar</button>
        </div>
        <div class="card">
            <img src="microondas.png" alt="Micro-ondas 25L">
            <h1>Micro-ondas 25L</h1>
            <p>R$ 640,00</p>
            <button>Comprar</button>
        </div>
    </div>
</body>
</html>
