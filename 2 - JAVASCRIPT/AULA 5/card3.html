<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cards com API</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: #f4f4f4;
      padding: 40px;
    }

    h1{
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .container{
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card{
      width: 300px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover{
      transform: translateY(-5px);
    }

    .card img{
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content{
      padding: 20px;
    }

    .card-content h2{
      margin-bottom: 10px;
      color: #222;
    }

    .card-content p{
      margin-bottom: 8px;
      color: #555;
    }

    button{
      display: block;
      margin: 0 auto 30px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Usuários Aleatórios</h1>

  <button onclick="buscarUsuarios()">
    Carregar Mais Usuários
  </button>

  <div class="container" id="container">
    <!-- Cards serão adicionados aqui -->
  </div>

  <script>

    async function buscarUsuarios(){

      const resposta = await fetch("https://randomuser.me/api/?results=3");

      const dados = await resposta.json();

      const usuarios = dados.results;

      const container = document.getElementById("container");

      usuarios.forEach(usuario => {

        const card = document.createElement("div");

        card.classList.add("card");

        card.innerHTML = `
        
          <img src="${usuario.picture.large}" alt="Foto">

          <div class="card-content">

            <h2>
              ${usuario.name.first} ${usuario.name.last}
            </h2>

            <p>
              <strong>Email:</strong>
              ${usuario.email}
            </p>

            <p>
              <strong>País:</strong>
              ${usuario.location.country}
            </p>

            <p>
              <strong>Telefone:</strong>
              ${usuario.phone}
            </p>

          </div>
        `;

        container.appendChild(card);

      });

    }

    // Carrega usuários ao abrir a página
    buscarUsuarios();

  </script>

</body>
</html>
