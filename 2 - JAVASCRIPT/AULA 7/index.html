<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jokenpô</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3a8a,#312e81);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#1e293b;
}

.botoes{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-3px);
}

.resultado{
    background:#f8fafc;
    padding:20px;
    border-radius:10px;
    margin-top:15px;
    line-height:1.8;
}

#resultadoFinal{
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>✊ ✋ ✌️ Jokenpô</h1>

    <div class="botoes">
        <button onclick="jogar(0)">Pedra</button>
        <button onclick="jogar(1)">Papel</button>
        <button onclick="jogar(2)">Tesoura</button>
    </div>

    <div class="resultado">
        <p><strong>Você:</strong> <span id="jogador">-</span></p>
        <p><strong>Computador:</strong> <span id="computador">-</span></p>
        <p id="resultadoFinal">Faça sua jogada!</p>
    </div>

</div>

<script>

const opcoes = ["Pedra","Papel","Tesoura"];

function jogar(jogador){

    const computador =
    Math.floor(Math.random() * opcoes.length);

    let resultado;

    if(jogador === computador){
        resultado = "🤝 Empate!";
    }
    else if(
        (jogador === 0 && computador === 2) ||
        (jogador === 1 && computador === 0) ||
        (jogador === 2 && computador === 1)
    ){
        resultado = "🎉 Você venceu!";
    }
    else{
        resultado = "💻 Computador venceu!";
    }

    document.getElementById("jogador").innerText =
        opcoes[jogador];

    document.getElementById("computador").innerText =
        opcoes[computador];

    document.getElementById("resultadoFinal").innerText =
        resultado;
}

</script>

</body>
</html>
